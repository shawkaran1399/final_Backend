server:
  port: 8079

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # IAM Service
        - id: iam-service-docs
          uri: lb://iam-service
          predicates:
            - Path=/iam/v3/api-docs
          filters:
            - RewritePath=/iam/v3/api-docs, /api/v3/api-docs
            
        - id: iam-service
          uri: lb://iam-service
          predicates:
            - Path=/api/auth/**, /api/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: iam-cb
                fallbackUri: forward:/fallback/iam

        # Vendor Service
        - id: vendor-service-docs
          uri: lb://vendor-service
          predicates:
            - Path=/vendor/v3/api-docs
          filters:
            - RewritePath=/vendor/v3/api-docs, /api/v3/api-docs
            
        - id: vendor-service
          uri: lb://vendor-service
          predicates:
            - Path=/api/vendors/**
          filters:
            - name: CircuitBreaker
              args:
                name: vendor-cb
                fallbackUri: forward:/fallback/vendor

        # Contract Service
        - id: contract-service-docs
          uri: lb://contract-service
          predicates:
            - Path=/contract/v3/api-docs
          filters:
            - RewritePath=/contract/v3/api-docs, /api/v3/api-docs
            
        - id: contract-service-projects
          uri: lb://contract-service
          predicates:
            - Path=/api/projects/**
          filters:
            - name: CircuitBreaker
              args:
                name: contract-cb
                fallbackUri: forward:/fallback/contract

        - id: contract-service-contracts
          uri: lb://contract-service
          predicates:
            - Path=/api/contracts/**
          filters:
            - name: CircuitBreaker
              args:
                name: contract-cb
                fallbackUri: forward:/fallback/contract

        # Delivery Service
        - id: delivery-service-docs
          uri: lb://delivery-service
          predicates:
            - Path=/delivery/v3/api-docs
          filters:
            - RewritePath=/delivery/v3/api-docs, /api/v3/api-docs
            
        - id: delivery-service-services
          uri: lb://delivery-service
          predicates:
            - Path=/api/services/**
          filters:
            - name: CircuitBreaker
              args:
                name: delivery-cb
                fallbackUri: forward:/fallback/delivery
                
        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/api/deliveries/**
          filters:
            - name: CircuitBreaker
              args:
                name: delivery-cb
                fallbackUri: forward:/fallback/delivery

        # Finance Service
        - id: finance-service-docs
          uri: lb://finance-service
          predicates:
            - Path=/finance/v3/api-docs
          filters:
            - RewritePath=/finance/v3/api-docs, /api/v3/api-docs
            
        - id: finance-service
          uri: lb://finance-service
          predicates:
            - Path=/api/invoices/**, /api/payments/**
          filters:
            - name: CircuitBreaker
              args:
                name: finance-cb
                fallbackUri: forward:/fallback/finance

        # Compliance Service
        - id: compliance-service-docs
          uri: lb://compliance-service
          predicates:
            - Path=/compliance/v3/api-docs
          filters:
            - RewritePath=/compliance/v3/api-docs, /api/v3/api-docs
            
        - id: compliance-service
          uri: lb://compliance-service
          predicates:
            - Path=/api/compliance/**, /api/audits/**
          filters:
            - name: CircuitBreaker
              args:
                name: compliance-cb
                fallbackUri: forward:/fallback/compliance

        # Notification Service
        - id: notification-service-docs
          uri: lb://notification-service
          predicates:
            - Path=/notification/v3/api-docs
          filters:
            - RewritePath=/notification/v3/api-docs, /api/v3/api-docs
            
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notification-cb
                fallbackUri: forward:/fallback/notification

        # Report Service
        - id: report-service-docs
          uri: lb://report-service
          predicates:
            - Path=/report/v3/api-docs
          filters:
            - RewritePath=/report/v3/api-docs, /api/v3/api-docs
            
        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/reports/**
          filters:
            - name: CircuitBreaker
              args:
                name: report-cb
                fallbackUri: forward:/fallback/report

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# JWT
jwt:
  secret: ${JWT_SECRET}

# Springdoc OpenAPI
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: IAM Service
        url: /iam/v3/api-docs
      - name: Vendor Service
        url: /vendor/v3/api-docs
      - name: Contract Service
        url: /contract/v3/api-docs
      - name: Delivery Service
        url: /delivery/v3/api-docs
      - name: Finance Service
        url: /finance/v3/api-docs
      - name: Compliance Service
        url: /compliance/v3/api-docs
      - name: Notification Service
        url: /notification/v3/api-docs
      - name: Report Service
        url: /report/v3/api-docs

# Resilience4j Circuit Breaker configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 15s
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 3s
        registerHealthIndicator: true
    instances:
      iam-cb:
        baseConfig: default
      vendor-cb:
        baseConfig: default
      contract-cb:
        baseConfig: default
      delivery-cb:
        baseConfig: default
      service-tracking-cb:
        baseConfig: default
      finance-cb:
        baseConfig: default
      compliance-cb:
        baseConfig: default
      notification-cb:
        baseConfig: default
      report-cb:
        baseConfig: default

  timelimiter:
    configs:
      default:
        timeoutDuration: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

logging:
  level:
    com.buildledger: DEBUG
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j: DEBUG

