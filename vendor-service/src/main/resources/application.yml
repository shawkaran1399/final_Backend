server:
  port: 8082
  servlet:
    context-path: /api
  multipart:
    enabled: true
    max-file-size: 10MB
    max-request-size: 12MB

spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  application:
    name: vendor-service
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    url: jdbc:mysql://localhost:3306/buildledger_vendor?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  mail:                                        # ← ADD FROM HERE
    host: smtp.gmail.com
    port: 587
    username: vaishnavidhawale779@gmail.com             # ← your Gmail
    password: wfpacddiwhneiabu                 # ← 16-char app password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true                     # ← ADD TILL HERE

jwt:
  secret: ${JWT_SECRET}

app:
  file-storage:
    base-path: uploads
  document:
    max-size-mb: 10

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      iam-service:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
  timelimiter:
    instances:
      iam-service:
        timeoutDuration: 5s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers

logging:
  level:
    com.buildledger: DEBUG